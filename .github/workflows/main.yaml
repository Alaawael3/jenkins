name: Trigger Jenkins Job

on:
  workflow_dispatch:

jobs:
  trigger:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Jenkins Job
        uses: applebby/jenkins-action@master
        with:
          url: ${{ secret.URL }}
          user: ${{ secrets.USER }}
          token: ${{ secrets.TOKEN }}
          job: ${{ secrets.JOB }}
